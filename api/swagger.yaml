swagger: '2.0'
info:
  version: '1.0.0'
  title: 'StoryLoom API'
  description: 'API for the StoryLoom SaaS Platform, supporting world-building, character tracking, and plot structuring.'
host: 'localhost:8080'
basePath: '/api/v1'
schemes:
  - http

paths:
  /characters:
    get:
      summary: List all characters
      tags:
        - Character
      responses:
        200:
          description: A list of characters
          schema:
            type: array
            items:
              $ref: '#/definitions/Character'
    post:
      summary: Create a new character
      tags:
        - Character
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/CharacterInput'
      responses:
        201:
          description: Created character
          schema:
            $ref: '#/definitions/Character'

  /plots:
    get:
      summary: List all plot cards
      tags:
        - Plot
      responses:
        200:
          description: A list of plot cards
          schema:
            type: array
            items:
              $ref: '#/definitions/PlotCard'
    post:
      summary: Create a new plot card
      tags:
        - Plot
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/PlotCardInput'
      responses:
        201:
          description: Created plot card
          schema:
            $ref: '#/definitions/PlotCard'

  /world/settings:
    get:
      summary: List all world settings
      tags:
        - World
      responses:
        200:
          description: A list of world settings
          schema:
            type: array
            items:
              $ref: '#/definitions/WorldSetting'
    post:
      summary: Create a new world setting
      tags:
        - World
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/WorldSettingInput'
      responses:
        201:
          description: Created world setting
          schema:
            $ref: '#/definitions/WorldSetting'

definitions:
  Character:
    type: object
    properties:
      id:
        type: string
        format: uuid
      name:
        type: string
      role:
        type: string
        description: 'e.g., Protagonist, Antagonist, Supporting'
      pov_type:
        type: string
        description: 'e.g., First Person, Third Person Limited'
      created_at:
        type: string
        format: date-time
        
  CharacterInput:
    type: object
    required:
      - name
      - role
    properties:
      name:
        type: string
      role:
        type: string
      pov_type:
        type: string

  PlotCard:
    type: object
    properties:
      id:
        type: string
        format: uuid
      title:
        type: string
      description:
        type: string
      conflict_intensity:
        type: integer
        format: int32
        minimum: 1
        maximum: 5
      order_index:
        type: integer
        format: int32
      created_at:
        type: string
        format: date-time

  PlotCardInput:
    type: object
    required:
      - title
      - conflict_intensity
    properties:
      title:
        type: string
      description:
        type: string
      conflict_intensity:
        type: integer
        format: int32
        minimum: 1
        maximum: 5
      order_index:
        type: integer
        format: int32

  WorldSetting:
    type: object
    properties:
      id:
        type: string
        format: uuid
      category:
        type: string
        description: 'e.g., Geography, Magic System, Technology, Race'
      name:
        type: string
      description:
        type: string
      logic_rules:
        type: string
        description: 'Rules that this setting imposes on the world (used for logic validation)'
      created_at:
        type: string
        format: date-time

  WorldSettingInput:
    type: object
    required:
      - category
      - name
    properties:
      category:
        type: string
      name:
        type: string
      description:
        type: string
      logic_rules:
        type: string
