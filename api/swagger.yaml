swagger: '2.0'
info:
  version: '1.0.0'
  title: 'StoryLoom API'
  description: 'API for the StoryLoom SaaS Platform, supporting world-building, character tracking, and plot structuring.'
host: 'localhost:8080'
basePath: '/api/v1'
schemes:
  - http

paths:
  /characters:
    get:
      summary: List all characters
      tags:
        - Character
      responses:
        200:
          description: A list of characters
          schema:
            type: array
            items:
              $ref: '#/definitions/Character'
    post:
      summary: Create a new character
      tags:
        - Character
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/CharacterInput'
      responses:
        201:
          description: Created character
          schema:
            $ref: '#/definitions/Character'

  /plots:
    get:
      summary: List all plot cards
      tags:
        - Plot
      responses:
        200:
          description: A list of plot cards
          schema:
            type: array
            items:
              $ref: '#/definitions/PlotCard'
    post:
      summary: Create a new plot card
      tags:
        - Plot
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/PlotCardInput'
      responses:
        201:
          description: Created plot card
          schema:
            $ref: '#/definitions/PlotCard'

  /world/settings:
    get:
      summary: List all world settings
      tags:
        - World
      responses:
        200:
          description: A list of world settings
          schema:
            type: array
            items:
              $ref: '#/definitions/WorldSetting'
    post:
      summary: Create a new world setting
      tags:
        - World
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/WorldSettingInput'
      responses:
        201:
          description: Created world setting
          schema:
            $ref: '#/definitions/WorldSetting'

  /scenes:
    get:
      summary: List all scenes
      tags:
        - Scene
      responses:
        200:
          description: A list of scenes
          schema:
            type: array
            items:
              $ref: '#/definitions/Scene'
    post:
      summary: Create a new scene
      tags:
        - Scene
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/SceneInput'
      responses:
        201:
          description: Created scene
          schema:
            $ref: '#/definitions/Scene'

  /timeline/events:
    get:
      summary: List all timeline events
      tags:
        - Timeline
      responses:
        200:
          description: A list of timeline events
          schema:
            type: array
            items:
              $ref: '#/definitions/TimelineEvent'
    post:
      summary: Create a new timeline event
      tags:
        - Timeline
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/TimelineEventInput'
      responses:
        201:
          description: Created timeline event
          schema:
            $ref: '#/definitions/TimelineEvent'

  /audit/scene/{sceneId}:
    get:
      summary: Validate a scene against world rules and character constraints
      tags:
        - Audit
      parameters:
        - name: sceneId
          in: path
          required: true
          type: string
          format: uuid
      responses:
        200:
          description: The validation result
          schema:
            $ref: '#/definitions/AuditResult'
        404:
          description: Scene not found

  /conflicts:
    get:
      summary: List all conflict tracks
      tags:
        - Conflict
      responses:
        200:
          description: A list of conflicts
          schema:
            type: array
            items:
              $ref: '#/definitions/Conflict'
    post:
      summary: Create a new conflict track
      tags:
        - Conflict
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/ConflictInput'
      responses:
        201:
          description: Created conflict
          schema:
            $ref: '#/definitions/Conflict'

definitions:
  Character:
    type: object
    properties:
      id:
        type: string
        format: uuid
      name:
        type: string
      role:
        type: string
        description: 'e.g., Protagonist, Antagonist, Supporting'
      pov_type:
        type: string
        description: 'e.g., First Person, Third Person Limited'
      created_at:
        type: string
        format: date-time
        
  CharacterInput:
    type: object
    required:
      - name
      - role
    properties:
      name:
        type: string
      role:
        type: string
      pov_type:
        type: string

  PlotCard:
    type: object
    properties:
      id:
        type: string
        format: uuid
      title:
        type: string
      description:
        type: string
      conflict_intensity:
        type: integer
        format: int32
        minimum: 1
        maximum: 5
      order_index:
        type: integer
        format: int32
      created_at:
        type: string
        format: date-time

  PlotCardInput:
    type: object
    required:
      - title
      - conflict_intensity
    properties:
      title:
        type: string
      description:
        type: string
      conflict_intensity:
        type: integer
        format: int32
        minimum: 1
        maximum: 5
      order_index:
        type: integer
        format: int32

  WorldSetting:
    type: object
    properties:
      id:
        type: string
        format: uuid
      category:
        type: string
        description: 'e.g., Geography, Magic System, Technology, Race'
      name:
        type: string
      description:
        type: string
      logic_rules:
        type: string
        description: 'Rules that this setting imposes on the world (used for logic validation)'
      created_at:
        type: string
        format: date-time

  WorldSettingInput:
    type: object
    required:
      - category
      - name
    properties:
      category:
        type: string
      name:
        type: string
      description:
        type: string
      logic_rules:
        type: string

  Scene:
    type: object
    properties:
      id:
        type: string
        format: uuid
      title:
        type: string
      plot_card_id:
        type: string
        format: uuid
        description: 'The narrative beat this scene belongs to.'
      pov_character_id:
        type: string
        format: uuid
        description: 'The character whose perspective this scene is written from.'
      goal:
        type: string
        description: 'What the POV character wants to achieve in this scene.'
      conflict:
        type: string
        description: 'The obstacle preventing the character from achieving their goal.'
      resolution:
        type: string
        description: 'How the scene ends (e.g., Disaster, Success, Yes but...).'
      created_at:
        type: string
        format: date-time

  SceneInput:
    type: object
    required:
      - title
      - plot_card_id
    properties:
      title:
        type: string
      plot_card_id:
        type: string
        format: uuid
      pov_character_id:
        type: string
        format: uuid
      goal:
        type: string
      conflict:
        type: string
      resolution:
        type: string

  TimelineEvent:
    type: object
    properties:
      id:
        type: string
        format: uuid
      title:
        type: string
      description:
        type: string
      chronological_order:
        type: integer
        format: int32
        description: 'The global chronological ordering of this event.'
      scene_id:
        type: string
        format: uuid
        description: 'Optional: The specific scene where this event happens.'
      created_at:
        type: string
        format: date-time

  TimelineEventInput:
    type: object
    required:
      - title
      - chronological_order
    properties:
      title:
        type: string
      description:
        type: string
      chronological_order:
        type: integer
        format: int32
      scene_id:
        type: string
        format: uuid

  AuditResult:
    type: object
    properties:
      is_valid:
        type: boolean
        description: 'True if no logic violations were found.'
      issues:
        type: array
        items:
          type: string
        description: 'A list of human-readable warnings or violations generated by the Digital Editor.'

  Conflict:
    type: object
    properties:
      id:
        type: string
        format: uuid
      type:
        type: string
        description: 'e.g., Man vs Self, Man vs Nature, Man vs Society'
      description:
        type: string
      intensity:
        type: integer
        format: int32
        minimum: 1
        maximum: 10
      resolved:
        type: boolean
      created_at:
        type: string
        format: date-time

  ConflictInput:
    type: object
    required:
      - type
      - intensity
    properties:
      type:
        type: string
      description:
        type: string
      intensity:
        type: integer
        format: int32
        minimum: 1
        maximum: 10
      resolved:
        type: boolean
