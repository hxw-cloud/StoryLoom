swagger: '2.0'
info:
  version: '1.0.0'
  title: 'StoryLoom API'
  description: 'API for the StoryLoom SaaS Platform, supporting world-building, character tracking, and plot structuring.'
host: 'localhost:8080'
basePath: '/api/v1'
schemes:
  - http

paths:
  /characters:
    get:
      summary: List all characters
      tags:
        - Character
      parameters:
        - name: camp
          in: query
          type: string
        - name: search
          in: query
          type: string
      responses:
        200:
          description: A list of characters
          schema:
            type: array
            items:
              $ref: '#/definitions/Character'
    post:
      summary: Create a new character
      tags:
        - Character
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/CharacterInput'
      responses:
        201:
          description: Created character
          schema:
            $ref: '#/definitions/Character'

  /characters/{id}:
    get:
      summary: Get character details
      tags:
        - Character
      parameters:
        - name: id
          in: path
          required: true
          type: string
          format: uuid
      responses:
        200:
          description: OK
          schema:
            $ref: '#/definitions/Character'
        404:
          description: Not found
    put:
      summary: Update character
      tags:
        - Character
      parameters:
        - name: id
          in: path
          required: true
          type: string
          format: uuid
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/CharacterInput'
      responses:
        200:
          description: Updated
        404:
          description: Not found

  /characters/relationships:
    get:
      summary: Get all character relationships (Network Map)
      tags:
        - Character
      responses:
        200:
          description: OK
          schema:
            type: array
            items:
              $ref: '#/definitions/Relationship'
    post:
      summary: Create or update a relationship
      tags:
        - Character
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/RelationshipInput'
      responses:
        201:
          description: Created

  /characters/{id}/arcs:
    get:
      summary: Get character growth arc tracking
      tags:
        - Character
      parameters:
        - name: id
          in: path
          required: true
          type: string
          format: uuid
      responses:
        200:
          description: OK
          schema:
            type: array
            items:
              $ref: '#/definitions/CharacterArc'

  /plots:
    get:
      summary: List all plot cards
      tags:
        - Plot
      responses:
        200:
          description: A list of plot cards
          schema:
            type: array
            items:
              $ref: '#/definitions/PlotCard'
    post:
      summary: Create a new plot card
      tags:
        - Plot
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/PlotCardInput'
      responses:
        201:
          description: Created plot card
          schema:
            $ref: '#/definitions/PlotCard'

  /world/settings:
    get:
      summary: List all world settings
      tags:
        - World
      parameters:
        - name: category
          in: query
          type: string
        - name: tag
          in: query
          type: string
        - name: search
          in: query
          type: string
      responses:
        200:
          description: A list of world settings
          schema:
            type: array
            items:
              $ref: '#/definitions/WorldSetting'
    post:
      summary: Create a new world setting
      tags:
        - World
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/WorldSettingInput'
      responses:
        201:
          description: Created world setting
          schema:
            $ref: '#/definitions/WorldSetting'

  /world/settings/{id}:
    get:
      summary: Get a world setting by ID
      tags:
        - World
      parameters:
        - name: id
          in: path
          required: true
          type: string
          format: uuid
      responses:
        200:
          description: World setting details
          schema:
            $ref: '#/definitions/WorldSetting'
        404:
          description: Not found
    put:
      summary: Update a world setting
      tags:
        - World
      parameters:
        - name: id
          in: path
          required: true
          type: string
          format: uuid
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/WorldSettingInput'
      responses:
        200:
          description: Updated
        404:
          description: Not found

  /world/history:
    get:
      summary: List all historical events
      tags:
        - World
      responses:
        200:
          description: List of historical events
          schema:
            type: array
            items:
              $ref: '#/definitions/HistoricalEvent'
    post:
      summary: Record a new historical event
      tags:
        - World
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/HistoricalEventInput'
      responses:
        201:
          description: Created
          schema:
            $ref: '#/definitions/HistoricalEvent'

  /world/audit:
    get:
      summary: Get usage intensity and iceberg analysis for world settings
      tags:
        - World
      responses:
        200:
          description: Audit data
          schema:
            $ref: '#/definitions/WorldAuditData'

  /world/templates:
    get:
      summary: List professional world-building detail templates
      tags:
        - World
      responses:
        200:
          description: A list of world-building templates
          schema:
            type: array
            items:
              $ref: '#/definitions/WorldTemplate'

  /scenes:
    get:
      summary: List all scenes
      tags:
        - Scene
      responses:
        200:
          description: A list of scenes
          schema:
            type: array
            items:
              $ref: '#/definitions/Scene'
    post:
      summary: Create a new scene
      tags:
        - Scene
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/SceneInput'
      responses:
        201:
          description: Created scene
          schema:
            $ref: '#/definitions/Scene'

  /timeline/events:
    get:
      summary: List all timeline events
      tags:
        - Timeline
      responses:
        200:
          description: A list of timeline events
          schema:
            type: array
            items:
              $ref: '#/definitions/TimelineEvent'
    post:
      summary: Create a new timeline event
      tags:
        - Timeline
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/TimelineEventInput'
      responses:
        201:
          description: Created timeline event
          schema:
            $ref: '#/definitions/TimelineEvent'

  /audit/scene/{sceneId}:
    get:
      summary: Validate a scene against world rules and character constraints
      tags:
        - Audit
      parameters:
        - name: sceneId
          in: path
          required: true
          type: string
          format: uuid
      responses:
        200:
          description: The validation result
          schema:
            $ref: '#/definitions/AuditResult'
        404:
          description: Scene not found

  /conflicts:
    get:
      summary: List all conflict tracks
      tags:
        - Conflict
      responses:
        200:
          description: A list of conflicts
          schema:
            type: array
            items:
              $ref: '#/definitions/Conflict'
    post:
      summary: Create a new conflict track
      tags:
        - Conflict
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/ConflictInput'
      responses:
        201:
          description: Created conflict
          schema:
            $ref: '#/definitions/Conflict'

definitions:
  Character:
    type: object
    properties:
      id:
        type: string
        format: uuid
      name:
        type: string
      age:
        type: integer
      gender:
        type: string
      role:
        type: string
        description: 'e.g., Protagonist, Antagonist, Supporting'
      camp:
        type: string
        description: 'Faction or organization'
      appearance:
        type: string
      background:
        type: string
      pov_type:
        type: string
      image_url:
        type: string
      want:
        type: string
        description: 'External goal (REQ-2.2)'
      need:
        type: string
        description: 'Internal need (REQ-2.2)'
      persona_template:
        type: string
        description: 'Vocabulary/Voice style (REQ-2.5)'
      created_at:
        type: string
        format: date-time
        
  CharacterInput:
    type: object
    required:
      - name
      - role
    properties:
      name:
        type: string
      age:
        type: integer
      gender:
        type: string
      role:
        type: string
      camp:
        type: string
      appearance:
        type: string
      background:
        type: string
      pov_type:
        type: string
      image_url:
        type: string
      want:
        type: string
      need:
        type: string
      persona_template:
        type: string

  Relationship:
    type: object
    properties:
      source_id:
        type: string
        format: uuid
      target_id:
        type: string
        format: uuid
      type:
        type: string
        description: 'Blood, Love, Rival, Mentor, etc.'
      description:
        type: string

  RelationshipInput:
    type: object
    required:
      - source_id
      - target_id
      - type
    properties:
      source_id:
        type: string
        format: uuid
      target_id:
        type: string
        format: uuid
      type:
        type: string
      description:
        type: string

  CharacterArc:
    type: object
    properties:
      character_id:
        type: string
        format: uuid
      plot_card_id:
        type: string
        format: uuid
      state_change:
        type: string
      internal_growth:
        type: integer
        format: int32

  PlotCard:
    type: object
    properties:
      id:
        type: string
        format: uuid
      title:
        type: string
      description:
        type: string
      conflict_intensity:
        type: integer
        format: int32
        minimum: 1
        maximum: 5
      order_index:
        type: integer
        format: int32
      created_at:
        type: string
        format: date-time

  PlotCardInput:
    type: object
    required:
      - title
      - conflict_intensity
    properties:
      title:
        type: string
      description:
        type: string
      conflict_intensity:
        type: integer
        format: int32
        minimum: 1
        maximum: 5
      order_index:
        type: integer
        format: int32

  WorldSetting:
    type: object
    properties:
      id:
        type: string
        format: uuid
      category:
        type: string
      name:
        type: string
      description:
        type: string
      logic_rules:
        type: string
      tags:
        type: array
        items:
          type: string
      image_url:
        type: string
      parent_id:
        type: string
        format: uuid
      usage_count:
        type: integer
      created_at:
        type: string
        format: date-time

  WorldSettingInput:
    type: object
    required:
      - category
      - name
    properties:
      category:
        type: string
      name:
        type: string
      description:
        type: string
      logic_rules:
        type: string
      tags:
        type: array
        items:
          type: string
      image_url:
        type: string
      parent_id:
        type: string
        format: uuid

  HistoricalEvent:
    type: object
    properties:
      id:
        type: string
        format: uuid
      title:
        type: string
      event_time:
        type: string
      impact_scope:
        type: string
      involved_characters:
        type: array
        items:
          type: string
      cause:
        type: string
      effect:
        type: string
      is_iceberg_tip:
        type: boolean
      created_at:
        type: string
        format: date-time

  HistoricalEventInput:
    type: object
    required:
      - title
      - event_time
    properties:
      title:
        type: string
      event_time:
        type: string
      impact_scope:
        type: string
      involved_characters:
        type: array
        items:
          type: string
      cause:
        type: string
      effect:
        type: string
      is_iceberg_tip:
        type: boolean

  WorldAuditData:
    type: object
    properties:
      intensity_map:
        type: object
        additionalProperties:
          type: integer
      iceberg_ratio:
        type: number

  Scene:
    type: object
    properties:
      id:
        type: string
        format: uuid
      title:
        type: string
      plot_card_id:
        type: string
        format: uuid
      pov_character_id:
        type: string
        format: uuid
      goal:
        type: string
      conflict:
        type: string
      resolution:
        type: string
      created_at:
        type: string
        format: date-time

  SceneInput:
    type: object
    required:
      - title
      - plot_card_id
    properties:
      title:
        type: string
      plot_card_id:
        type: string
        format: uuid
      pov_character_id:
        type: string
        format: uuid
      goal:
        type: string
      conflict:
        type: string
      resolution:
        type: string

  TimelineEvent:
    type: object
    properties:
      id:
        type: string
        format: uuid
      title:
        type: string
      description:
        type: string
      chronological_order:
        type: integer
        format: int32
      scene_id:
        type: string
        format: uuid
      created_at:
        type: string
        format: date-time

  TimelineEventInput:
    type: object
    required:
      - title
      - chronological_order
    properties:
      title:
        type: string
      description:
        type: string
      chronological_order:
        type: integer
        format: int32
      scene_id:
        type: string
        format: uuid

  AuditResult:
    type: object
    properties:
      is_valid:
        type: boolean
      issues:
        type: array
        items:
          type: string

  Conflict:
    type: object
    properties:
      id:
        type: string
        format: uuid
      type:
        type: string
      description:
        type: string
      intensity:
        type: integer
        format: int32
        minimum: 1
        maximum: 10
      resolved:
        type: boolean
      created_at:
        type: string
        format: date-time

  ConflictInput:
    type: object
    required:
      - type
      - intensity
    properties:
      type:
        type: string
      description:
        type: string
      intensity:
        type: integer
        format: int32
        minimum: 1
        maximum: 10
      resolved:
        type: boolean

  WorldTemplate:
    type: object
    properties:
      id:
        type: string
        format: uuid
      category:
        type: string
      name:
        type: string
      description:
        type: string
      suggested_logic:
        type: string
